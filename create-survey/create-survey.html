<!DOCTYPE html>

    <title>Create a Survey</title>
    <link rel="stylesheet" href="create-survey.css">
</head>
<body>
    <h1>Create a survey</h1>
    <div class="input-field">
        <label for="title-input">Survey Title:</label>
        <input class="text-input" id="title-input" type="text">
    </div>
    <div class="input-field">
        <label for="question-1-input">Question 1:</label>
        <input class="text-input" id="question-1-input" type="text">
        <label for="question-1-answer-1">Answer 1:</label>
        <input class="text-input" id="question-1-answer-1-input" type="text">
        <label for="question-1-answer-2">Answer 2:</label>
        <input class="text-input" id="question-1-answer-2-input" type="text">
    </div>
    <button class="operation-button" id="create-question-button">Create New Question</button>
    <button class="operation-button" id="save-survey-button">Save Survey</button>
    <br>
    <br>
    <a id="result-text"></a>
    <script src="create-survey.js"></script>
